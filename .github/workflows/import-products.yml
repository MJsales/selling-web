name: Import products from CJ

# Run this manually from the GitHub "Actions" tab.
# It calls the CJ Dropshipping API with your secret credentials,
# downloads product images, rewrites data/products.json, and commits
# the result back to the repo — which redeploys your GitHub Pages store.

on:
  workflow_dispatch:
    inputs:
      product_ids:
        description: "CJ product IDs (PIDs), separated by spaces"
        required: true
        type: string

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run the CJ importer
        env:
          CJ_EMAIL: ${{ secrets.CJ_EMAIL }}
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
        run: node scripts/import-cj.mjs ${{ inputs.product_ids }}

      - name: Commit the imported products
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json images/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Import products from CJ: ${{ inputs.product_ids }}"
            git push
          fi
